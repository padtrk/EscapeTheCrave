<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>EscapeTheCrave — Free you to be the true you</title>
<meta name="description" content="Research shows that if you can resist a craving for sixty seconds, you can beat it. EscapeTheCrave helps you ride out the urge.">
<meta name="theme-color" content="#0d2818">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #0d2818;
    --green-mid: #1a4d2e;
    --green-soft: #2d6a4f;
    --green-glow: #74c69d;
    --cream: #f4f1de;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--green-dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.5) 100%);
    z-index: 1;
  }
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px 24px;
    text-align: center;
    z-index: 2;
    transition: opacity 0.6s ease;
  }
  .screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* LANDING SCREEN */
  #landing .brand {
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--green-glow);
    margin-bottom: 28px;
  }
  #landing h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(36px, 9vw, 64px);
    line-height: 1.05;
    max-width: 14ch;
    margin-bottom: 14px;
  }
  #landing .tagline {
    font-size: clamp(15px, 4vw, 19px);
    font-style: italic;
    opacity: 0.75;
    margin-bottom: 40px;
    max-width: 22ch;
  }
  #landing .research {
    font-family: 'VT323', monospace;
    font-size: clamp(13px, 3.5vw, 16px);
    letter-spacing: 0.05em;
    color: var(--green-glow);
    border-top: 1px solid rgba(116,198,157,0.3);
    border-bottom: 1px solid rgba(116,198,157,0.3);
    padding: 14px 18px;
    margin-bottom: 44px;
    max-width: 32ch;
    line-height: 1.5;
    text-transform: uppercase;
  }
  .crave-btn {
    background: transparent;
    color: var(--cream);
    border: 2px solid var(--green-glow);
    border-radius: 999px;
    padding: 18px 42px;
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 0 20px rgba(116,198,157,0.15);
  }
  .crave-btn:hover, .crave-btn:active {
    background: var(--green-glow);
    color: var(--green-dark);
    box-shadow: 0 0 40px rgba(116,198,157,0.4);
  }

  /* SURF SCREEN */
  #surf {
    padding: 0;
  }
  #surfCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .surf-message {
    position: absolute;
    bottom: 8%;
    left: 0;
    right: 0;
    text-align: center;
    font-style: italic;
    font-size: clamp(15px, 4vw, 19px);
    opacity: 0;
    transition: opacity 2s ease;
    padding: 0 24px;
    color: var(--cream);
    z-index: 3;
  }
  .surf-message.show { opacity: 0.7; }

  /* DONE SCREEN */
  #done h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(32px, 8vw, 52px);
    line-height: 1.1;
    margin-bottom: 18px;
    max-width: 14ch;
  }
  #done .sub {
    font-size: clamp(15px, 4vw, 18px);
    font-style: italic;
    opacity: 0.65;
    max-width: 24ch;
    margin-bottom: 48px;
  }
  #done .again {
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--green-glow);
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0.6;
    text-decoration: underline;
    text-underline-offset: 6px;
  }
  #done .again:hover { opacity: 1; }
</style>
</head>
<body>

  <!-- LANDING -->
  <div class="screen" id="landing">
    <div class="brand">⌁ EscapeTheCrave ⌁</div>
    <h1>Free you to be the true you</h1>
    <p class="tagline">a sixty-second escape</p>
    <div class="research">
      Research shows that if you can resist a craving for sixty seconds, you can beat it.
    </div>
    <button class="crave-btn" onclick="startSurf()">I have a craving</button>
  </div>

  <!-- SURF -->
  <div class="screen hidden" id="surf">
    <canvas id="surfCanvas"></canvas>
  </div>

  <!-- DONE -->
  <div class="screen hidden" id="done">
    <h2>The wave has passed</h2>
    <p class="sub">you are still here</p>
    <button class="again" onclick="reset()">return</button>
  </div>

<script>
  const landing = document.getElementById('landing');
  const surf = document.getElementById('surf');
  const done = document.getElementById('done');
  const canvas = document.getElementById('surfCanvas');
  const ctx = canvas.getContext('2d');

  let animationId = null;
  let startTime = null;
  const DURATION = 60000; // 60 seconds

  // Grid config
  let cellSize = 18;
  let cols = 0;
  let rows = 0;
  let snakeBody = []; // array of {x, y} grid cells, head is last
  let direction = { x: 1, y: 0 };
  const SNAKE_LENGTH = 28;
  const STEP_INTERVAL = 220; // ms per step — slow & relaxing
  let lastStep = 0;

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    // Recalculate grid
    cellSize = Math.max(14, Math.min(window.innerWidth, window.innerHeight) / 26);
    cols = Math.floor(window.innerWidth / cellSize);
    rows = Math.floor(window.innerHeight / cellSize);
  }

  function initSnake() {
    const startX = Math.floor(cols / 2);
    const startY = Math.floor(rows / 2);
    snakeBody = [];
    for (let i = 0; i < SNAKE_LENGTH; i++) {
      snakeBody.push({ x: startX - (SNAKE_LENGTH - 1 - i), y: startY });
    }
    direction = { x: 1, y: 0 };
  }

  function startSurf() {
    landing.classList.add('hidden');
    setTimeout(() => {
      surf.classList.remove('hidden');
      resizeCanvas();
      initSnake();
      ctx.fillStyle = 'rgba(13, 40, 24, 1)';
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      startTime = performance.now();
      lastStep = startTime;
      animate();
    }, 600);
  }

  // Possible turns relative to current direction (no reversing)
  function getValidMoves() {
    const head = snakeBody[snakeBody.length - 1];
    const candidates = [
      { x: direction.x, y: direction.y },                 // straight
      { x: -direction.y, y: direction.x },                // turn right
      { x: direction.y, y: -direction.x }                 // turn left
    ];
    const bodySet = new Set(snakeBody.slice(1).map(s => s.x + ',' + s.y)); // exclude tail (it'll move)
    return candidates.filter(d => {
      const nx = head.x + d.x;
      const ny = head.y + d.y;
      // stay inside grid with 1-cell margin
      if (nx < 1 || nx >= cols - 1 || ny < 1 || ny >= rows - 1) return false;
      // don't hit body
      if (bodySet.has(nx + ',' + ny)) return false;
      return true;
    });
  }

  function chooseDirection() {
    const moves = getValidMoves();
    if (moves.length === 0) {
      // Stuck — extremely rare; allow any non-reverse move ignoring body
      const fallback = [
        { x: direction.x, y: direction.y },
        { x: -direction.y, y: direction.x },
        { x: direction.y, y: -direction.x }
      ];
      direction = fallback[Math.floor(Math.random() * fallback.length)];
      return;
    }
    // Bias: prefer going straight (gentler, more "snake-like" feel),
    // but occasionally turn so it wanders.
    const straight = moves.find(m => m.x === direction.x && m.y === direction.y);
    if (straight && Math.random() < 0.78) {
      direction = straight;
    } else {
      const turns = moves.filter(m => !(m.x === direction.x && m.y === direction.y));
      if (turns.length) {
        direction = turns[Math.floor(Math.random() * turns.length)];
      } else if (straight) {
        direction = straight;
      } else {
        direction = moves[0];
      }
    }
  }

  function step() {
    chooseDirection();
    const head = snakeBody[snakeBody.length - 1];
    const newHead = { x: head.x + direction.x, y: head.y + direction.y };
    snakeBody.push(newHead);
    if (snakeBody.length > SNAKE_LENGTH) snakeBody.shift();
  }

  function draw() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    // Full clear each frame so old positions vanish (grid snake, no trail decay)
    ctx.fillStyle = 'rgba(13, 40, 24, 1)';
    ctx.fillRect(0, 0, w, h);

    // Center the grid in the screen
    const offsetX = (w - cols * cellSize) / 2;
    const offsetY = (h - rows * cellSize) / 2;

    // Draw each segment as a rounded square, brightening toward the head
    for (let i = 0; i < snakeBody.length; i++) {
      const seg = snakeBody[i];
      const t = i / (snakeBody.length - 1);
      const alpha = 0.25 + t * 0.75;
      const size = cellSize * (0.55 + t * 0.25);
      const px = offsetX + seg.x * cellSize + cellSize / 2;
      const py = offsetY + seg.y * cellSize + cellSize / 2;

      ctx.fillStyle = `rgba(116, 198, 157, ${alpha})`;
      ctx.beginPath();
      const half = size / 2;
      const r = size * 0.3;
      // rounded square
      ctx.moveTo(px - half + r, py - half);
      ctx.lineTo(px + half - r, py - half);
      ctx.quadraticCurveTo(px + half, py - half, px + half, py - half + r);
      ctx.lineTo(px + half, py + half - r);
      ctx.quadraticCurveTo(px + half, py + half, px + half - r, py + half);
      ctx.lineTo(px - half + r, py + half);
      ctx.quadraticCurveTo(px - half, py + half, px - half, py + half - r);
      ctx.lineTo(px - half, py - half + r);
      ctx.quadraticCurveTo(px - half, py - half, px - half + r, py - half);
      ctx.fill();
    }

    // Soft glow on head
    const head = snakeBody[snakeBody.length - 1];
    const hx = offsetX + head.x * cellSize + cellSize / 2;
    const hy = offsetY + head.y * cellSize + cellSize / 2;
    const grad = ctx.createRadialGradient(hx, hy, 0, hx, hy, cellSize * 1.6);
    grad.addColorStop(0, 'rgba(244, 241, 222, 0.55)');
    grad.addColorStop(0.4, 'rgba(116, 198, 157, 0.25)');
    grad.addColorStop(1, 'rgba(116, 198, 157, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(hx, hy, cellSize * 1.6, 0, Math.PI * 2);
    ctx.fill();
  }

  function animate() {
    const now = performance.now();
    const elapsed = now - startTime;

    if (elapsed >= DURATION) {
      finish();
      return;
    }

    if (now - lastStep >= STEP_INTERVAL) {
      step();
      lastStep = now;
    }

    draw();
    animationId = requestAnimationFrame(animate);
  }

  function finish() {
    cancelAnimationFrame(animationId);
    setTimeout(() => {
      surf.classList.add('hidden');
      setTimeout(() => {
        done.classList.remove('hidden');
      }, 600);
    }, 400);
  }

  function reset() {
    done.classList.add('hidden');
    setTimeout(() => {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = 'rgba(13, 40, 24, 1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      landing.classList.remove('hidden');
    }, 600);
  }

  window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
